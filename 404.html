<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found - Pilot Sales Distribution</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: #f0f4f8;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .error-container {
            text-align: center;
            max-width: 500px;
        }
        .error-container .code {
            font-size: 8rem;
            font-weight: 900;
            color: #1a7b6b;
            line-height: 1;
        }
        .error-container h2 {
            font-size: 1.8rem;
            color: #0b2a3b;
            margin: 0.5rem 0;
        }
        .error-container p {
            color: #6a889a;
            margin-bottom: 1.5rem;
        }
        .error-container .btn-home {
            display: inline-block;
            background: #1a7b6b;
            color: #fff;
            padding: 0.7rem 2.5rem;
            border-radius: 50px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s;
        }
        .error-container .btn-home:hover {
            background: #0f4f43;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="code">404</div>
        <h2>Page Not Found</h2>
        <p>Oops! The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="btn-home">🏠 Back to Home</a>
    </div>
</body>
</html>
